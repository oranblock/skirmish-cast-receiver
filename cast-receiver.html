<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKIRMISH | DEBUG UPLINK</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: monospace; color: #0f8; }
        #debug-log {
            position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
            background: rgba(0,20,0,0.9); border-top: 1px solid #0f8;
            padding: 10px; font-size: 12px; overflow-y: auto; z-index: 1000;
            white-space: pre-wrap; pointer-events: none;
        }
        #game-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 50; background: #050805; }
        #overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100;
            background: #000;
        }
        .hud { border: 1px solid #0f8; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="debug-log">--- SYSTEM BOOT / DEBUG LOG ACTIVE ---</div>

    <div id="overlay">
        <div class="hud">
            <h2>SKIRMISH TERMINAL</h2>
            <div id="status-text">INITIALIZING CAST SDK...</div>
            <div id="qr-container" style="display:none; margin:10px;"><canvas id="qr"></canvas></div>
        </div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        const logEl = document.getElementById('debug-log');
        const statusEl = document.getElementById('status-text');
        const frameEl = document.getElementById('game-frame');

        function log(msg, type = "INFO") {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `\n[${time}] [${type}] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }

        window.onerror = (e) => log("GLOBAL ERROR: " + e, "FATAL");

        function startBattle(host) {
            log("Uplink command received for: " + host, "NET");
            statusEl.innerHTML = "UPLINK ESTABLISHED: " + host;
            
            const tvUrl = "http://" + host + "/tv";
            log("Loading iframe: " + tvUrl);
            
            frameEl.src = tvUrl;
            
            // Check if reachable
            fetch("http://" + host + "/sys_info")
                .then(r => log("Phone server reachable!", "OK"))
                .catch(e => log("CANNOT REACH PHONE: Is it on same WiFi? Check firewall.", "ERR"));

            setTimeout(() => {
                document.getElementById('overlay').style.display = "none";
                log("Transitioning to Battle View...");
            }, 5000);
        }

        // 🛰️ CAST SDK DEBUGGING
        try {
            log("Initializing Cast Context...");
            const context = cast.framework.CastReceiverContext.getInstance();
            const namespace = 'urn:x-cast:com.da3dee3.skirmish';

            context.addCustomMessageListener(namespace, (event) => {
                log("RAW MESSAGE: " + JSON.stringify(event.data), "CAST");
                if (event.data && event.data.host) {
                    startBattle(event.data.host);
                }
            });

            const options = new cast.framework.CastReceiverOptions();
            options.disableIdleTimeout = true;
            
            context.start(options);
            log("Cast SDK Started. Awaiting Phone...");
            statusEl.innerHTML = "READY FOR HANDSHAKE";
        } catch(e) {
            log("Cast SDK Init Failed: " + e.message, "ERR");
        }

        // Support Simulation
        window.addEventListener('message', (e) => {
            if (e.data.host) startBattle(e.data.host);
        });
    </script>
</body>
</html>
