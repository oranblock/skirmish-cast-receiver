<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKIRMISH | SYSTEM DIAGNOSTIC</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Courier New', monospace; color: #00ff88; }
        #terminal {
            position: absolute; inset: 0; padding: 20px; font-size: 14px;
            background: linear-gradient(180deg, #001100 0%, #000 100%);
            overflow-y: auto; z-index: 1000; line-height: 1.5;
        }
        .log-entry { margin-bottom: 4px; }
        .log-info { color: #00ff88; }
        .log-warn { color: #ffff00; font-weight: bold; }
        .log-error { color: #ff3333; font-weight: bold; background: rgba(255,0,0,0.1); }
        .log-success { color: #ffffff; background: #004400; padding: 0 5px; }
        #game-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 10; display: none; }
        #manual-input-box {
            position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
            background: rgba(0,20,0,0.9); border: 1px solid #0f8; padding: 20px; z-index: 1100;
        }
        input { background: #000; border: 1px solid #0f8; color: #0f8; padding: 10px; font-family: monospace; width: 180px; }
        button { background: #0f8; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="terminal">
        <div style="font-size: 24px; font-weight: bold; border-bottom: 1px solid #0f8; margin-bottom: 15px; padding-bottom: 5px;">
            SKIRMISH_OS v4.0.1 DIAGNOSTIC_TERMINAL
        </div>
        <div id="output"></div>
    </div>

    <div id="manual-input-box">
        <div style="font-size: 10px; margin-bottom: 10px;">MANUAL UPLINK OVERRIDE</div>
        <input type="text" id="manual-host" placeholder="10.42.0.71:XXXXX">
        <button onclick="manualConnect()">LINK</button>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        const output = document.getElementById('output');
        const frameEl = document.getElementById('game-frame');
        const terminal = document.getElementById('terminal');

        function log(msg, type = "info") {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            output.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        log("System boot sequence initiated...");
        log("Checking browser capabilities...", "info");
        log(`Resolution: ${window.innerWidth}x${window.innerHeight}`, "info");

        // 🛡️ STEP 1: VERIFY CHROMECAST SDK
        try {
            const context = cast.framework.CastReceiverContext.getInstance();
            const namespace = 'urn:x-cast:com.da3dee3.skirmish';
            log("Cast SDK library found. Initializing context...", "info");

            context.addCustomMessageListener(namespace, (event) => {
                log("INCOMING CAST PACKET DETECTED!", "log-success");
                log(`DATA: ${JSON.stringify(event.data)}`, "info");
                if (event.data.host) triggerUplink(event.data.host);
            });

            context.start({ disableIdleTimeout: true });
            log(`Receiver active on namespace: ${namespace}`, "info");
        } catch(e) {
            log("Cast SDK not detected. Switching to Manual Web Mode.", "warn");
        }

        // 🛡️ STEP 2: HANDSHAKE LOGIC
        function triggerUplink(host) {
            log(`Establishing handshake with mobile host: ${host}...`, "info");
            localStorage.setItem('last_host', host);

            const tvUrl = `http://${host}/tv`;
            log(`Preparing iframe source: ${tvUrl}`, "info");
            
            // Test if the phone server is even reachable
            log("Pinging phone server for sys_info...", "info");
            fetch(`http://${host}/sys_info`, { mode: 'cors' })
                .then(r => r.json())
                .then(data => {
                    log("CONNECTION VERIFIED: Phone is responding!", "log-success");
                    log(`SERVER_STATUS: Phase=${data.phase}, Ticks=${data.tick}, Units=${data.bodies}`, "info");
                    
                    frameEl.src = tvUrl;
                    log("Iframe loading started. Switching to Battle View in 5s...", "info");
                    
                    setTimeout(() => {
                        terminal.style.display = "none";
                        document.getElementById('manual-input-box').style.display = "none";
                        frameEl.style.display = "block";
                        log("Transition complete.", "info");
                    }, 5000);
                })
                .catch(err => {
                    log(`NETWORK FAILURE: Cannot reach http://${host}`, "error");
                    log("REASON: Likely firewall, phone screen off, or different WiFi bands.", "warn");
                });
        }

        function manualConnect() {
            const host = document.getElementById('manual-host').value.trim();
            if (host) triggerUplink(host);
        }

        // Recovery
        const last = localStorage.getItem('last_host');
        if (last) {
            log(`Found cached host: ${last}. Auto-filling override.`, "info");
            document.getElementById('manual-host').value = last;
        }

        // Global Error Catching
        window.onerror = (msg, url, line) => log(`RUNTIME ERROR: ${msg} at ${line}`, "error");

    </script>
</body>
</html>
