<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKIRMISH | TACTICAL BROADCAST</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#050805; font-family: 'Courier New', monospace; color: #00ff88; }

        #overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: radial-gradient(circle, #0a1a0a 0%, #050805 100%);
            transition: opacity 1.5s ease;
        }

        .hud-border {
            border: 2px solid #00ff88; padding: 40px; border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); background: rgba(0,0,0,0.9);
            text-align: center; max-width: 85%;
        }

        h1 { letter-spacing: 12px; font-size: 52px; margin: 0 0 20px 0; text-shadow: 0 0 15px #00ff88; }
        .status { font-size: 20px; margin-bottom: 30px; opacity: 0.9; font-weight: bold; }

        #qr-container {
            background: #fff; padding: 15px; border-radius: 8px;
            display: none; margin: 20px auto; width: 220px; height: 220px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #game-frame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 50;
        }

        .scan-hint { font-size: 16px; margin-top: 20px; color: #00ff88; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="hud-border">
            <h1>SKIRMISH</h1>
            <div id="status-text" class="status">AWAITING TACTICAL UPLINK...</div>

            <div id="qr-container">
                <canvas id="qr"></canvas>
            </div>
            <div id="join-hint" class="scan-hint" style="display:none;">SCAN TO JOIN TACTICAL SQUAD</div>
        </div>
    </div>

    <!-- The actual game view will load here -->
    <iframe id="game-frame" allow="autoplay"></iframe>

    <script>
        const statusEl = document.getElementById('status-text');
        const qrContainer = document.getElementById('qr-container');
        const hintEl = document.getElementById('join-hint');
        const frameEl = document.getElementById('game-frame');
        const overlayEl = document.getElementById('overlay');

        function triggerHandshake(host) {
            statusEl.innerHTML = "UPLINK ESTABLISHED: " + host;

            new QRious({
                element: document.getElementById('qr'),
                value: "http://" + host + "/game",
                size: 220,
                padding: 0
            });
            qrContainer.style.display = 'block';
            hintEl.style.display = 'block';

            const tvUrl = "http://" + host + "/tv";
            frameEl.src = tvUrl;

            setTimeout(() => {
                overlayEl.style.opacity = "0";
                frameEl.style.display = "block";
                setTimeout(() => overlayEl.style.display = "none", 1500);
            }, 8000);
        }

        // CAST SDK
        try {
            const context = cast.framework.CastReceiverContext.getInstance();
            const namespace = 'urn:x-cast:com.da3dee3.skirmish';
            context.addCustomMessageListener(namespace, (event) => {
                if (event.data && event.data.host) triggerHandshake(event.data.host);
            });
            context.start({ disableIdleTimeout: true });
        } catch(e) {}

        window.addEventListener('message', (e) => {
            if (e.data && e.data.host) triggerHandshake(e.data.host);
        });
    </script>
</body>
</html>
