<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKIRMISH | SYSTEM DIAGNOSTIC</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: monospace; color: #00ff88; }
        #terminal {
            position: absolute; inset: 0; padding: 20px; font-size: 14px;
            background: rgba(0,20,0,0.95);
            overflow-y: auto; z-index: 1000; line-height: 1.5;
        }
        .log-entry { margin-bottom: 4px; }
        .log-info { color: #00ff88; }
        .log-warn { color: #ffff00; font-weight: bold; }
        .log-error { color: #ff3333; font-weight: bold; background: rgba(255,0,0,0.1); }
        .log-success { color: #ffffff; background: #004400; padding: 0 5px; }
        #game-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 10; display: none; }
        #manual-input-box {
            position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
            background: rgba(0,20,0,0.9); border: 1px solid #0f8; padding: 20px; z-index: 1100;
        }
        input { background: #000; border: 1px solid #0f8; color: #0f8; padding: 10px; font-family: monospace; width: 180px; }
        button { background: #0f8; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="terminal">
        <div style="font-size: 24px; font-weight: bold; border-bottom: 1px solid #0f8; margin-bottom: 15px; padding-bottom: 5px;">
            SKIRMISH_OS v4.1.0 DIAGNOSTIC_TERMINAL
        </div>
        <div id="output"></div>
    </div>

    <div id="manual-input-box">
        <div style="font-size: 10px; margin-bottom: 10px;">MANUAL UPLINK OVERRIDE</div>
        <input type="text" id="manual-host" placeholder="IP:PORT">
        <button onclick="manualConnect()">LINK</button>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        const output = document.getElementById('output');
        const frameEl = document.getElementById('game-frame');
        const terminal = document.getElementById('terminal');

        function log(msg, type = "info") {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            output.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        log("System boot sequence initiated...");
        log(`Viewport: ${window.innerWidth}x${window.innerHeight}`, "info");

        function triggerUplink(host) {
            log(`Starting handshake with: ${host}`, "info");
            localStorage.setItem('last_host', host);

            fetch(`http://${host}/sys_info`)
                .then(r => r.json())
                .then(data => {
                    log("CONNECTION VERIFIED: Phone is alive!", "log-success");
                    log(`SERVER_STATUS: Phase=${data.phase}, Units=${data.bodies}`, "info");

                    frameEl.src = `http://${host}/tv`;
                    log("Iframe loading... wait 5s.", "info");

                    setTimeout(() => {
                        terminal.style.background = "rgba(0,0,0,0.5)"; // KEEP LOGS VISIBLE
                        terminal.style.height = "25%";
                        terminal.style.top = "75%";
                        document.getElementById('manual-input-box').style.display = "none";
                        frameEl.style.display = "block";
                        log("Map layer activated.", "info");
                    }, 5000);
                })
                .catch(err => {
                    log(`NETWORK FAILURE: Is ${host} correct?`, "error");
                });
        }

        function manualConnect() {
            const host = document.getElementById('manual-host').value.trim();
            if (host) triggerUplink(host);
        }

        try {
            const context = cast.framework.CastReceiverContext.getInstance();
            const namespace = 'urn:x-cast:com.da3dee3.skirmish';
            context.addCustomMessageListener(namespace, (event) => {
                log("CAST SIGNAL RECEIVED!", "log-success");
                if (event.data.host) triggerUplink(event.data.host);
            });
            context.start({ disableIdleTimeout: true });
            log("Cast SDK listening...");
        } catch(e) {
            log("Running in standard browser mode.", "warn");
        }

        const last = localStorage.getItem('last_host');
        if (last) document.getElementById('manual-host').value = last;

        window.onerror = (msg, url, line) => log(`SCRIPT ERROR: ${msg} line:${line}`, "error");
    </script>
</body>
</html>
